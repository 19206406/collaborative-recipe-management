services:
  sqlserver: 
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment: 
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
    networks: 
      - microservices-network
  
  postgres: 
    image: postgres:16-alpine 
    environment: 
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Sebastian@Postgres123
    networks: 
      - microservices-network

networks:
  microservices-network: 
    driver: bridge