services:
  sqlserver: 
    container_name: userdb
    environment: 
      - SA_PASSWORD=Sebastian@User123
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
  
  sqlserver2:
    container_name: ratingdb
    environment: 
      - SA_PASSWORD=Sebastian@Rating123
    ports:
      - "1434:1433"
    volumes:
      - sqlserver2-data:/var/opt/mssql
      
  postgres: 
    container_name: recipedb
    image: postgres:16-alpine
    environment: 
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=SebastianPass123
      - POSTGRES_DB=recipe_db
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres 
      -c password_encryption=scram-sha-256

  redis:
    container_name: redis-cache
    ports: 
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlserver-data: 
    driver: local
  sqlserver2-data:
    driver: local
  postgres-data: 
    driver: local
  redis-data:
    driver: local