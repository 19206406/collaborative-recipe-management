services:

  sqlserver: 
    container_name: userdb
    environment: 
      - SA_PASSWORD=Sebastian@User123
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
  

  sqlserver2:
    container_name: ratingdb
    environment: 
      - SA_PASSWORD=Sebastian@Rating123
    ports:
      - "1434:1433"
    volumes:
      - sqlserver2-data:/var/opt/mssql


  postgres: 
    container_name: recipedb
    image: postgres:16-alpine
    environment: 
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=SebastianPass123
      - POSTGRES_DB=recipe_db
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres 
      -c password_encryption=scram-sha-256


  redis:
    container_name: redis-cache
    ports: 
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  rabbitmq: 
    container_name: rabbitmq-broker
    environment: 
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=Sebastian@Rabbit123
      - RABBITMQ_DEFAULT_VHOST=/
    ports: 
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s


volumes:
  sqlserver-data: 
    driver: local
  sqlserver2-data:
    driver: local
  postgres-data: 
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local