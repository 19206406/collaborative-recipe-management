services:

  sqlserver: 
    container_name: userdb
    environment: 
      - MSSQL_SA_PASSWORD=Sebastian@User123
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Sebastian@User123 -Q 'SELECT 1' -No"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
  

  sqlserver2:
    container_name: ratingdb
    environment: 
      - MSSQL_SA_PASSWORD=Sebastian@Rating123
    ports:
      - "1444:1433"
    volumes:
      - sqlserver2-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Sebastian@Rating123 -Q 'SELECT 1' -No"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s


  sqlserver3:
    container_name: notificationdb
    environment: 
      - MSSQL_SA_PASSWORD=Sebastian@Notification123
    ports:
      - "1435:1433"
    volumes:
      - sqlserver3-data:/var/opt/mssql 
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Sebastian@Notification123 -Q 'SELECT 1' -No"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s


  postgres: 
    container_name: recipedb
    image: postgres:16-alpine
    environment: 
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=Sebastian@Postgres123
      - POSTGRES_DB=recipe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin recipe_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: >
      postgres 
      -c password_encryption=md5


  redis:
    container_name: redis-cache
    ports: 
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  rabbitmq: 
    container_name: rabbitmq-broker
    environment: 
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=Sebastian@Rabbit123
      - RABBITMQ_DEFAULT_VHOST=/
    ports: 
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s


volumes:
  sqlserver-data: 
    driver: local
  sqlserver2-data:
    driver: local
  sqlserver3-data: 
    driver: local
  postgres-data: 
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local